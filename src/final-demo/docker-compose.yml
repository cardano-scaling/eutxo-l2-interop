        condition: service_completed_successfully

  hydra-node-jon-lt:
    <<: *hydra-node-base
    profiles: ["full"]
    volumes:
      - ./credentials:/devnet/credentials:ro
      - ./config/protocol-parameters.json:/devnet/protocol-parameters.json:ro
      - ./persistence/jon-lt:/devnet/persistence/jon-lt
      - shared-config:/shared
      - cardano-node-data:/data:ro
    ports:
      - "4328:4328"
      - "5328:5328"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        HYDRA_SCRIPTS_TX_ID=$$(cat /shared/hydra-scripts-tx-id.txt | tr -d '\n\r')
        HYDRA_NODE_PATH=$$(find /nix/store -name "hydra-node" -type f 2>/dev/null | head -1)
        exec $$HYDRA_NODE_PATH \
          --node-id 5 \
          --api-host 0.0.0.0 \
          --listen 172.16.233.28:5328 \
          --monitoring-port 6328 \
          --api-port 4328 \
          --peer 172.16.233.22:5322 \
          --peer 172.16.233.29:5329 \
          --hydra-signing-key /devnet/credentials/jon/jon-hydra.sk \
          --hydra-verification-key /devnet/credentials/bob/bob-hydra.vk \
          --hydra-verification-key /devnet/credentials/ida/ida-hydra.vk \
          --cardano-signing-key /devnet/credentials/jon/jon-funds.sk \
          --cardano-verification-key /devnet/credentials/bob/bob-funds.vk \
          --cardano-verification-key /devnet/credentials/ida/ida-funds.vk \
          --persistence-dir /devnet/persistence/jon-lt \
          --node-socket /data/node.socket \
          --testnet-magic 42 \
          --hydra-scripts-tx-id "$$HYDRA_SCRIPTS_TX_ID" \
          --contestation-period 5s \
          --ledger-protocol-parameters /devnet/protocol-parameters.json
    networks:
      hydra_net:
        ipv4_address: 172.16.233.28
    depends_on:
      hydra-scripts-publisher:
        condition: service_completed_successfully

  # Head C: ida-3 + charlie
  hydra-node-charlie-lt:
    <<: *hydra-node-base
    profiles: ["full"]
    volumes:
      - ./credentials:/devnet/credentials:ro
      - ./config/protocol-parameters.json:/devnet/protocol-parameters.json:ro
      - ./persistence/charlie-lt:/devnet/persistence/charlie-lt
      - shared-config:/shared
      - cardano-node-data:/data:ro
    ports:
      - "4333:4333"
      - "5333:5333"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        HYDRA_SCRIPTS_TX_ID=$$(cat /shared/hydra-scripts-tx-id.txt | tr -d '\n\r')
        HYDRA_NODE_PATH=$$(find /nix/store -name "hydra-node" -type f 2>/dev/null | head -1)
        exec $$HYDRA_NODE_PATH \
          --node-id 6 \
          --api-host 0.0.0.0 \
          --listen 172.16.233.33:5333 \
          --monitoring-port 6333 \
          --api-port 4333 \
          --peer 172.16.233.39:5339 \
          --hydra-signing-key /devnet/credentials/charlie/charlie-hydra.sk \
          --hydra-verification-key /devnet/credentials/ida/ida-hydra.vk \
          --cardano-signing-key /devnet/credentials/charlie/charlie-funds.sk \
          --cardano-verification-key /devnet/credentials/ida/ida-funds.vk \
          --persistence-dir /devnet/persistence/charlie-lt \
          --node-socket /data/node.socket \
