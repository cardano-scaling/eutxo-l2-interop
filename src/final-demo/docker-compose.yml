    profiles: ["full"]
    volumes:
      - ./credentials:/devnet/credentials:ro
      - ./config/protocol-parameters.json:/devnet/protocol-parameters.json:ro
      - ./persistence/ida-3-lt:/devnet/persistence/ida-3-lt
      - shared-config:/shared
      - cardano-node-data:/data:ro
    ports:
      - "4339:4339"
      - "5339:5339"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        HYDRA_SCRIPTS_TX_ID=$$(cat /shared/hydra-scripts-tx-id.txt | tr -d '\n\r')
        HYDRA_NODE_PATH=$$(find /nix/store -name "hydra-node" -type f 2>/dev/null | head -1)
        exec $$HYDRA_NODE_PATH \
          --node-id 7 \
          --api-host 0.0.0.0 \
          --listen 172.16.233.39:5339 \
          --monitoring-port 6339 \
          --api-port 4339 \
          --peer 172.16.233.33:5333 \
          --hydra-signing-key /devnet/credentials/ida/ida-hydra.sk \
          --hydra-verification-key /devnet/credentials/charlie/charlie-hydra.vk \
          --cardano-signing-key /devnet/credentials/ida/ida-funds.sk \
          --cardano-verification-key /devnet/credentials/charlie/charlie-funds.vk \
          --persistence-dir /devnet/persistence/ida-3-lt \
          --node-socket /data/node.socket \
          --testnet-magic 42 \
          --hydra-scripts-tx-id "$$HYDRA_SCRIPTS_TX_ID" \
          --contestation-period 5s \
          --ledger-protocol-parameters /devnet/protocol-parameters.json
    networks:
      hydra_net:
        ipv4_address: 172.16.233.39
    depends_on:
      hydra-scripts-publisher:
        condition: service_completed_successfully

  startup-time-logger:
    profiles: ["full"]
    image: alpine
    depends_on:
      - hydra-node-alice-lt
      - hydra-node-ida-1-lt
      - hydra-node-bob-lt
      - hydra-node-ida-2-lt
      - hydra-node-jon-lt
      - hydra-node-charlie-lt
      - hydra-node-ida-3-lt
    command: sh -c "ts=$$(( $$(date +%s) * 1000 )) && echo $$ts > /shared/startup_time.txt && echo $$ts > /final-demo/startup_time.txt && echo 'Timestamp written to /shared and final-demo/startup_time.txt:' $$ts"
    volumes:
      - shared-config:/shared
      - ./:/final-demo

networks:
  hydra_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.233.0/24
          gateway: 172.16.233.1
