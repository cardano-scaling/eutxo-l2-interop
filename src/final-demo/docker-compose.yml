        exec $$HYDRA_NODE_PATH \
          --node-id 3 \
          --api-host 0.0.0.0 \
          --listen 172.16.233.22:5322 \
          --monitoring-port 6322 \
          --api-port 4322 \
          --peer 172.16.233.29:5329 \
          --peer 172.16.233.28:5328 \
          --hydra-signing-key /devnet/credentials/bob/bob-hydra.sk \
          --hydra-verification-key /devnet/credentials/ida/ida-hydra.vk \
          --hydra-verification-key /devnet/credentials/jon/jon-hydra.vk \
          --cardano-signing-key /devnet/credentials/bob/bob-funds.sk \
          --cardano-verification-key /devnet/credentials/ida/ida-funds.vk \
          --cardano-verification-key /devnet/credentials/jon/jon-funds.vk \
          --persistence-dir /devnet/persistence/bob-lt \
          --node-socket /data/node.socket \
          --testnet-magic 42 \
