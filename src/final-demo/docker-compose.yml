x-hydra-node-base: &hydra-node-base
  image: ghcr.io/cardano-scaling/hydra-node:1.0.0
  networks:
    hydra_net:
  restart: always

volumes:
  cardano-node-data:
  shared-config:
  final_demo_pg:
  final_demo_next_cache:

services:
  postgres:
    profiles: ["dev", "full"]
    image: postgres:16
    container_name: final-demo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: final_demo
    ports:
      - "5434:5432"
    volumes:
      - final_demo_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d final_demo"]
      interval: 2s
      timeout: 5s
      retries: 20

  init:
    profiles: ["dev", "full"]
    image: node:20
    container_name: final-demo-init
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /workspace/src/final-demo
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/final_demo?schema=public
      NPM_CONFIG_LEGACY_PEER_DEPS: "true"
    command: sh -c "npm install --legacy-peer-deps && npm run prisma:push && npm run prisma:generate"
    volumes:
      - ./:/workspace/src/final-demo

  app:
    profiles: ["full"]
    image: node:20
    container_name: final-demo-app
    depends_on:
      postgres:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    working_dir: /workspace/src/final-demo
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/final_demo?schema=public
      FINAL_DEMO_ADMIN_PASSWORD: ${FINAL_DEMO_ADMIN_PASSWORD:-}
      FINAL_DEMO_CHARLIE_PASSWORD: ${FINAL_DEMO_CHARLIE_PASSWORD:-}
      WORKER_POLL_MS: 2000
      REQUEST_FUNDS_MOCK_FAILURE_MODE: ${REQUEST_FUNDS_MOCK_FAILURE_MODE:-none}
      BUY_TICKET_MOCK_FAILURE_MODE: ${BUY_TICKET_MOCK_FAILURE_MODE:-none}
      HYDRA_ADAPTER_MODE: ${HYDRA_ADAPTER_MODE:-real}
      HYDRA_OPERATION_TIMEOUT_MS: ${HYDRA_OPERATION_TIMEOUT_MS:-20000}
      HYDRA_HEAD_A_API_URL: ${HYDRA_HEAD_A_API_URL:-http://hydra-node-ida-1-lt:4319}
      HYDRA_HEAD_B_API_URL: ${HYDRA_HEAD_B_API_URL:-http://hydra-node-ida-2-lt:4329}
      HYDRA_HEAD_B_JON_API_URL: ${HYDRA_HEAD_B_JON_API_URL:-http://hydra-node-jon-lt:4328}
      HYDRA_HEAD_C_API_URL: ${HYDRA_HEAD_C_API_URL:-http://hydra-node-ida-3-lt:4339}
      HYDRA_OPS_DRAFT_TTL_MS: ${HYDRA_OPS_DRAFT_TTL_MS:-300000}
      NPM_CONFIG_LEGACY_PEER_DEPS: "true"
    command: sh -c "npm run dev"
    volumes:
      - ./:/workspace/src/final-demo
      - final_demo_next_cache:/workspace/src/final-demo/.next
    ports:
      - "3000:3000"
    networks:
      - default
      - hydra_net

  worker:
    profiles: ["dev", "full"]
    image: node:20
    container_name: final-demo-worker
    depends_on:
      postgres:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    working_dir: /workspace/src/final-demo
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/final_demo?schema=public
      FINAL_DEMO_ADMIN_PASSWORD: ${FINAL_DEMO_ADMIN_PASSWORD:-}
      FINAL_DEMO_CHARLIE_PASSWORD: ${FINAL_DEMO_CHARLIE_PASSWORD:-}
      WORKER_POLL_MS: 2000
      REQUEST_FUNDS_MOCK_FAILURE_MODE: ${REQUEST_FUNDS_MOCK_FAILURE_MODE:-none}
      BUY_TICKET_MOCK_FAILURE_MODE: ${BUY_TICKET_MOCK_FAILURE_MODE:-none}
      HYDRA_ADAPTER_MODE: ${HYDRA_ADAPTER_MODE:-real}
      HYDRA_OPERATION_TIMEOUT_MS: ${HYDRA_OPERATION_TIMEOUT_MS:-20000}
      HYDRA_HEAD_A_API_URL: ${HYDRA_HEAD_A_API_URL:-http://hydra-node-ida-1-lt:4319}
      HYDRA_HEAD_B_API_URL: ${HYDRA_HEAD_B_API_URL:-http://hydra-node-ida-2-lt:4329}
      HYDRA_HEAD_B_JON_API_URL: ${HYDRA_HEAD_B_JON_API_URL:-http://hydra-node-jon-lt:4328}
      HYDRA_HEAD_C_API_URL: ${HYDRA_HEAD_C_API_URL:-http://hydra-node-ida-3-lt:4339}
      HYDRA_OPS_DRAFT_TTL_MS: ${HYDRA_OPS_DRAFT_TTL_MS:-300000}
      NPM_CONFIG_LEGACY_PEER_DEPS: "true"
    command: sh -c "npm run worker"
    volumes:
      - ./:/workspace/src/final-demo
    networks:
      - default
      - hydra_net

  cardano-node:
    profiles: ["full"]
    image: ghcr.io/intersectmbo/cardano-node:10.1.4
    platform: linux/amd64
    volumes:
      - cardano-node-data:/data
      - shared-config:/shared
      - ./testnet:/testnet
      - ./testnet/cardano-private-testnet-config/busybox:/busybox
      - ./entrypoint.sh:/entrypoint.sh
      - ./testnet/cardano-private-testnet-config/cardano/topology-pool1.json:/shared/node-1-topology.json
      - ./testnet/cardano-private-testnet-config/cardano/config-pool1.json:/shared/node-1-config.json.base
      - ./testnet/cardano-private-testnet-config/cardano/keys:/keys
      - ./testnet/cardano-private-testnet-config/genesis/byron/genesis.json:/shared/byron/genesis.json.base
      - ./testnet/cardano-private-testnet-config/genesis/shelley/genesis.json:/shared/shelley/genesis.json.base
      - ./testnet/cardano-private-testnet-config/genesis/shelley/genesis.alonzo.json:/shared/shelley/genesis.alonzo.json.base
      - ./testnet/cardano-private-testnet-config/genesis/shelley/genesis-utxo.addr:/shared/shelley/genesis-utxo.addr
      - ./testnet/cardano-private-testnet-config/genesis/shelley/genesis-utxo.skey:/shared/shelley/genesis-utxo.skey
      - ./testnet/cardano-private-testnet-config/genesis/shelley/genesis-utxo.vkey:/shared/shelley/genesis-utxo.vkey
      - ./testnet/cardano-private-testnet-config/genesis/conway/genesis.conway.json:/shared/conway/genesis.conway.json.base
      - ./cardano-query-api.sh:/cardano-query-api.sh
      - ./credentials:/devnet/credentials:ro
      - ./config/protocol-parameters.json:/devnet/protocol-parameters.json:ro
      - ./persistence:/devnet/persistence
    environment:
      - CARDANO_NODE_SOCKET_PATH=/data/node.socket
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    ports:
      - "32000:32000"
      - "1442:1442"
    networks:
      hydra_net:
        ipv4_address: 172.16.233.100
    healthcheck:
      test: ["CMD-SHELL", "test -f /shared/cardano.ready"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 60s

  cardano-submit-api:
    profiles: ["full"]
    image: ghcr.io/intersectmbo/cardano-submit-api:10.1.4
    volumes:
      - cardano-node-data:/data:ro
      - shared-config:/shared:ro
    environment:
      - CARDANO_NODE_SOCKET_PATH=/data/node.socket
    command:
      - --socket-path
      - /data/node.socket
      - --listen-address
      - "0.0.0.0"
      - --port
      - "8090"
      - --config
      - /shared/node-1-config.json
      - --testnet-magic
      - "42"
    ports:
      - "8090:8090"
    networks:
      hydra_net:
        ipv4_address: 172.16.233.101
    depends_on:
      cardano-node:
        condition: service_healthy

  hydra-scripts-publisher:
    profiles: ["full"]
    image: ghcr.io/cardano-scaling/hydra-node:1.0.0
    volumes:
      - shared-config:/shared
      - ./credentials:/devnet/credentials:ro
      - ./persistence:/devnet/persistence
      - ./hydra-scripts-publisher-entrypoint.sh:/hydra-scripts-publisher-entrypoint.sh
      - cardano-node-data:/data:ro
    entrypoint: ["/bin/sh", "/hydra-scripts-publisher-entrypoint.sh"]
    networks:
      hydra_net:
    depends_on:
      cardano-node:
        condition: service_healthy

  # Lottery topology (from src/infra/docker-compose.lottery.yaml)
  # Head A: ida-1 + alice
  hydra-node-alice-lt:
    <<: *hydra-node-base
    profiles: ["full"]
    volumes:
      - ./credentials:/devnet/credentials:ro
      - ./config/protocol-parameters.json:/devnet/protocol-parameters.json:ro
      - ./persistence/alice-lt:/devnet/persistence/alice-lt
      - shared-config:/shared
      - cardano-node-data:/data:ro
    ports:
      - "4311:4311"
      - "5311:5311"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        HYDRA_SCRIPTS_TX_ID=$$(cat /shared/hydra-scripts-tx-id.txt | tr -d '\n\r')
        HYDRA_NODE_PATH=$$(find /nix/store -name "hydra-node" -type f 2>/dev/null | head -1)
        exec $$HYDRA_NODE_PATH \
          --node-id 1 \
          --api-host 0.0.0.0 \
          --listen 172.16.233.11:5311 \
          --monitoring-port 6311 \
          --api-port 4311 \
          --peer 172.16.233.19:5319 \
          --hydra-signing-key /devnet/credentials/alice/alice-hydra.sk \
          --hydra-verification-key /devnet/credentials/ida/ida-hydra.vk \
          --cardano-signing-key /devnet/credentials/alice/alice-funds.sk \
          --cardano-verification-key /devnet/credentials/ida/ida-funds.vk \
          --persistence-dir /devnet/persistence/alice-lt \
          --node-socket /data/node.socket \
          --testnet-magic 42 \
          --hydra-scripts-tx-id "$$HYDRA_SCRIPTS_TX_ID" \
          --contestation-period 5s \
          --ledger-protocol-parameters /devnet/protocol-parameters.json
    networks:
      hydra_net:
        ipv4_address: 172.16.233.11
    depends_on:
      hydra-scripts-publisher:
        condition: service_completed_successfully

  hydra-node-ida-1-lt:
    <<: *hydra-node-base
    profiles: ["full"]
    volumes:
      - ./credentials:/devnet/credentials:ro
      - ./config/protocol-parameters.json:/devnet/protocol-parameters.json:ro
