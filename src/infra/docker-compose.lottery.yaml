# Lottery topology (ID 3)
#
# Head A: ida-1, alice   (custodial head)
# Head B: ida-2, bob, jon (lottery contract head)
# Head C: ida-3, charlie  (charlie head)
#
# Port schema: api-port 4XYZ, ws-port 5XYZ, monitoring-port 6XYZ
#   X = 3 (topology ID), Y = HeadId (A1Z26), Z = UserId (A1Z26)
#   User IDs: Alice=1, Bob=2, Charlie=3, Jon=8, Ida=9
#   ipv4 address: 172.16.23X.YZ (each topology gets its own /24 subnet)
#
# This compose file runs Hydra nodes connected to Cardano Preprod via Blockfrost.

x-hydra-node-base: &hydra-node-base
  image: ghcr.io/cardano-scaling/hydra-node:1.3.0
  networks:
    hydra_net:
  restart: always

services:
  # Head A (custodial): ida-1, alice
  hydra-node-alice-lt:
    <<: *hydra-node-base
    volumes:
      - .:/devnet
      - ./persistence/alice-lt:/devnet/persistence/alice-lt
    ports:
      - "4311:4311"
      - "5311:5311"
    command:
      [
        "--node-id", "1",
        "--api-host", "0.0.0.0",
        "--listen", "172.16.233.11:5311",
        "--monitoring-port", "6311",
        "--api-port", "4311",
        "--peer", "172.16.233.19:5319",
        "--hydra-signing-key", "/devnet/credentials/alice/alice-hydra.sk",
        "--cardano-signing-key", "/devnet/credentials/alice/alice-funds.sk",
        "--hydra-verification-key", "/devnet/credentials/ida/ida-hydra.vk",
        "--cardano-verification-key", "/devnet/credentials/ida/ida-funds.vk",
        "--persistence-dir", "/devnet/persistence/alice-lt",
        "--network", "preprod",
        "--blockfrost", "/devnet/blockfrost.txt",
        "--ledger-protocol-parameters", "/devnet/protocol-parameters.json",
      ]
    networks:
      hydra_net:
        ipv4_address: 172.16.233.11

  hydra-node-ida-1-lt:
    <<: *hydra-node-base
    volumes:
      - .:/devnet
      - ./persistence/ida-1-lt:/devnet/persistence/ida-1-lt
    ports:
      - "4319:4319"
      - "5319:5319"
    command:
      [
        "--node-id", "2",
        "--api-host", "0.0.0.0",
        "--listen", "172.16.233.19:5319",
        "--monitoring-port", "6319",
        "--api-port", "4319",
        "--peer", "172.16.233.11:5311",
        "--hydra-signing-key", "/devnet/credentials/ida/ida-hydra.sk",
        "--cardano-signing-key", "/devnet/credentials/ida/ida-funds.sk",
        "--hydra-verification-key", "/devnet/credentials/alice/alice-hydra.vk",
        "--cardano-verification-key", "/devnet/credentials/alice/alice-funds.vk",
        "--persistence-dir", "/devnet/persistence/ida-1-lt",
        "--network", "preprod",
        "--blockfrost", "/devnet/blockfrost.txt",
        "--ledger-protocol-parameters", "/devnet/protocol-parameters.json",
      ]
    networks:
      hydra_net:
        ipv4_address: 172.16.233.19

  # Head B (lottery contract): bob, ida-2, jon
  hydra-node-bob-lt:
    <<: *hydra-node-base
    volumes:
      - .:/devnet
      - ./persistence/bob-lt:/devnet/persistence/bob-lt
    ports:
      - "4322:4322"
      - "5322:5322"
    command:
      [
        "--node-id", "3",
        "--api-host", "0.0.0.0",
        "--listen", "172.16.233.22:5322",
        "--monitoring-port", "6322",
        "--api-port", "4322",
        "--peer", "172.16.233.29:5329",
        "--peer", "172.16.233.28:5328",
        "--hydra-signing-key", "/devnet/credentials/bob/bob-hydra.sk",
        "--cardano-signing-key", "/devnet/credentials/bob/bob-funds.sk",
        "--hydra-verification-key", "/devnet/credentials/ida/ida-hydra.vk",
        "--cardano-verification-key", "/devnet/credentials/ida/ida-funds.vk",
        "--hydra-verification-key", "/devnet/credentials/jon/jon-hydra.vk",
        "--cardano-verification-key", "/devnet/credentials/jon/jon-funds.vk",
        "--persistence-dir", "/devnet/persistence/bob-lt",
          "--network", "preprod",
        "--blockfrost", "/devnet/blockfrost.txt",
        "--ledger-protocol-parameters", "/devnet/protocol-parameters.json",
      ]
    networks:
      hydra_net:
        ipv4_address: 172.16.233.22

  hydra-node-ida-2-lt:
    <<: *hydra-node-base
    volumes:
      - .:/devnet
      - ./persistence/ida-2-lt:/devnet/persistence/ida-2-lt
    ports:
      - "4329:4329"
      - "5329:5329"
    command:
      [
        "--node-id", "4",
        "--api-host", "0.0.0.0",
        "--listen", "172.16.233.29:5329",
        "--monitoring-port", "6329",
        "--api-port", "4329",
        "--peer", "172.16.233.22:5322",
        "--peer", "172.16.233.28:5328",
        "--hydra-signing-key", "/devnet/credentials/ida/ida-hydra.sk",
        "--cardano-signing-key", "/devnet/credentials/ida/ida-funds.sk",
        "--hydra-verification-key", "/devnet/credentials/bob/bob-hydra.vk",
        "--cardano-verification-key", "/devnet/credentials/bob/bob-funds.vk",
        "--hydra-verification-key", "/devnet/credentials/jon/jon-hydra.vk",
        "--cardano-verification-key", "/devnet/credentials/jon/jon-funds.vk",
        "--persistence-dir", "/devnet/persistence/ida-2-lt",
        "--network", "preprod",
        "--blockfrost", "/devnet/blockfrost.txt",
        "--ledger-protocol-parameters", "/devnet/protocol-parameters.json",
      ]
    networks:
      hydra_net:
        ipv4_address: 172.16.233.29

  hydra-node-jon-lt:
    <<: *hydra-node-base
    volumes:
      - .:/devnet
      - ./persistence/jon-lt:/devnet/persistence/jon-lt
    ports:
      - "4328:4328"
      - "5328:5328"
    command:
      [
        "--node-id", "5",
        "--api-host", "0.0.0.0",
        "--listen", "172.16.233.28:5328",
        "--monitoring-port", "6328",
        "--api-port", "4328",
        "--peer", "172.16.233.22:5322",
        "--peer", "172.16.233.29:5329",
        "--hydra-signing-key", "/devnet/credentials/jon/jon-hydra.sk",
        "--cardano-signing-key", "/devnet/credentials/jon/jon-funds.sk",
        "--hydra-verification-key", "/devnet/credentials/bob/bob-hydra.vk",
        "--cardano-verification-key", "/devnet/credentials/bob/bob-funds.vk",
        "--hydra-verification-key", "/devnet/credentials/ida/ida-hydra.vk",
        "--cardano-verification-key", "/devnet/credentials/ida/ida-funds.vk",
        "--persistence-dir", "/devnet/persistence/jon-lt",
        "--network", "preprod",
        "--blockfrost", "/devnet/blockfrost.txt",
        "--ledger-protocol-parameters", "/devnet/protocol-parameters.json",
      ]
    networks:
      hydra_net:
        ipv4_address: 172.16.233.28

  # Head C (charlie): charlie, ida-3
  hydra-node-charlie-lt:
    <<: *hydra-node-base
    volumes:
      - .:/devnet
      - ./persistence/charlie-lt:/devnet/persistence/charlie-lt
    ports:
      - "4333:4333"
      - "5333:5333"
    command:
      [
        "--node-id", "6",
        "--api-host", "0.0.0.0",
        "--listen", "172.16.233.33:5333",
        "--monitoring-port", "6333",
        "--api-port", "4333",
        "--peer", "172.16.233.39:5339",
        "--hydra-signing-key", "/devnet/credentials/charlie/charlie-hydra.sk",
        "--cardano-signing-key", "/devnet/credentials/charlie/charlie-funds.sk",
        "--hydra-verification-key", "/devnet/credentials/ida/ida-hydra.vk",
        "--cardano-verification-key", "/devnet/credentials/ida/ida-funds.vk",
        "--persistence-dir", "/devnet/persistence/charlie-lt",
        "--network", "preprod",
        "--blockfrost", "/devnet/blockfrost.txt",
        "--ledger-protocol-parameters", "/devnet/protocol-parameters.json",
      ]
    networks:
      hydra_net:
        ipv4_address: 172.16.233.33

  hydra-node-ida-3-lt:
    <<: *hydra-node-base
    volumes:
      - .:/devnet
      - ./persistence/ida-3-lt:/devnet/persistence/ida-3-lt
    ports:
      - "4339:4339"
      - "5339:5339"
    command:
      [
        "--node-id", "7",
        "--api-host", "0.0.0.0",
        "--listen", "172.16.233.39:5339",
        "--monitoring-port", "6339",
        "--api-port", "4339",
        "--peer", "172.16.233.33:5333",
        "--hydra-signing-key", "/devnet/credentials/ida/ida-hydra.sk",
        "--cardano-signing-key", "/devnet/credentials/ida/ida-funds.sk",
        "--hydra-verification-key", "/devnet/credentials/charlie/charlie-hydra.vk",
        "--cardano-verification-key", "/devnet/credentials/charlie/charlie-funds.vk",
        "--persistence-dir", "/devnet/persistence/ida-3-lt",
        "--network", "preprod",
        "--blockfrost", "/devnet/blockfrost.txt",
        "--ledger-protocol-parameters", "/devnet/protocol-parameters.json",
      ]
    networks:
      hydra_net:
        ipv4_address: 172.16.233.39

  startup-time-logger:
    image: alpine
    depends_on:
      - hydra-node-alice-lt
      - hydra-node-ida-1-lt
      - hydra-node-bob-lt
      - hydra-node-ida-2-lt
      - hydra-node-jon-lt
      - hydra-node-charlie-lt
      - hydra-node-ida-3-lt
    command: sh -c "echo $$(( $$(date +%s) * 1000 )) > /shared/startup_time.txt && echo 'Timestamp written:' $$(cat /shared/startup_time.txt)"
    volumes:
      - .:/shared

networks:
  hydra_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.233.0/24
          gateway: 172.16.233.1
